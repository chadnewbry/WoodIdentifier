appId: com.chadnewbry.WoodIdentifier
name: "Capture App Store Screenshots"
---

# First launch: seed sample data with clean state
- launchApp:
    appId: com.chadnewbry.WoodIdentifier
    clearState: true
    arguments:
      --screenshot-mode: ""
    permissions:
      camera: allow
      photos: allow
      location: always
      notifications: allow

# Relaunch without clearing so @Query picks up seeded data
- launchApp:
    appId: com.chadnewbry.WoodIdentifier
    clearState: false
    arguments:
      --screenshot-mode: ""

# Tap Allow on camera permission dialog
- tapOn:
    text: "Allow"
    optional: true

# Dismiss tutorial overlay if present
- tapOn:
    text: "Got It"
    optional: true

# Wait for UI to settle
- waitForAnimationToEnd

# Screenshot 1: Camera (home) tab
- takeScreenshot: "01-camera"

# Screenshot 2: History tab
- tapOn:
    text: "History"
- waitForAnimationToEnd
- takeScreenshot: "02-history"

# Screenshot 3: Database tab
- tapOn:
    text: "Database"
- waitForAnimationToEnd
- takeScreenshot: "03-database"

# Screenshot 4: Species detail (tap first species)
- tapOn: "Black Walnut"
- waitForAnimationToEnd
- takeScreenshot: "04-species-detail"

# Navigate back to database
- tapOn:
    text: "Database"
- waitForAnimationToEnd

# Screenshot 5: Settings tab
- tapOn:
    text: "Settings"
- waitForAnimationToEnd
- takeScreenshot: "05-settings"
